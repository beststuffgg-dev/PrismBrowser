name: Build Prism (Electron — Ubuntu/Debian)

# Builds the Electron app into a Debian/Ubuntu .deb package plus a portable
# AppImage, then publishes them as the "Prismatix Ubuntu" GitHub Release.
on:
  push:
    branches: [ Prismatix-ubuntu ]
  workflow_dispatch:
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electron
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build .deb + AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux deb AppImage --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v5
        with:
          name: Prism-ubuntu
          path: |
            electron/dist/*.deb
            electron/dist/*.AppImage
          if-no-files-found: error

      - name: Publish "Prismatix Ubuntu" release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ubuntu
          name: Prismatix Ubuntu
          body: |
            **Prismatix — Ubuntu / Debian** (Electron)

            - `*.deb` — install with: `sudo apt install ./Prism_*_amd64.deb`
            - `*.AppImage` — `chmod +x Prism-*.AppImage && ./Prism-*.AppImage`
          files: |
            electron/dist/*.deb
            electron/dist/*.AppImage
