name: Build Prism (Electron — Arch Linux)

# Builds the Electron app into an Arch .pacman package plus a portable
# AppImage (electron-builder produces the pacman package on an Ubuntu runner),
# then publishes them as the "Prismatix Arch" GitHub Release.
on:
  push:
    branches: [ Prismatix-arch ]
  workflow_dispatch:
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electron
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install bsdtar (required by electron-builder's pacman target)
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools
        working-directory: ${{ github.workspace }}

      - name: Install dependencies
        run: npm install

      - name: Build .pacman + AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux pacman AppImage --publish never

      - name: Upload Arch artifacts
        uses: actions/upload-artifact@v5
        with:
          name: Prism-arch
          path: |
            electron/dist/*.pacman
            electron/dist/*.AppImage
          if-no-files-found: error

      - name: Publish "Prismatix Arch" release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: arch
          name: Prismatix Arch
          body: |
            **Prismatix — Arch Linux** (Electron)

            - `*.pacman` — install with: `sudo pacman -U prism-electron-*.pacman`
            - `*.AppImage` — `chmod +x Prism-*.AppImage && ./Prism-*.AppImage`
            - AUR `PKGBUILD` is available in `packaging/arch/`.
          files: |
            electron/dist/*.pacman
            electron/dist/*.AppImage
