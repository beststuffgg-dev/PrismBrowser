name: Build Prism DMG

# Builds the macOS app and packages Prism.dmg on a real macOS runner.
on:
  push:
    branches: [ main, Prismatix ]
  workflow_dispatch:        # lets you trigger it manually from the Actions tab
  release:
    types: [ created ]

jobs:
  build:
    runs-on: macos-14        # Apple Silicon runner with Xcode 15 / Swift 5.9+
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build & package DMG
        run: |
          chmod +x build_dmg.sh
          ./build_dmg.sh

      - name: Upload DMG as build artifact
        uses: actions/upload-artifact@v5
        with:
          name: Prism-dmg
          path: dist/Prism.dmg
          if-no-files-found: error

      # If this run was triggered by publishing a GitHub Release,
      # attach the DMG to that release automatically.
      - name: Attach DMG to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Prism.dmg
