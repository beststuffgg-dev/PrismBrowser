name: Build Prism DMG

# Builds the native macOS app and packages Prism.dmg on a real macOS runner,
# then publishes it as the "Prismatix macOS" GitHub Release.
on:
  push:
    branches: [ main, Prismatix ]
  workflow_dispatch:
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14        # Apple Silicon runner with Xcode 15 / Swift 5.9+
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build & package DMG
        run: |
          chmod +x build_dmg.sh
          ./build_dmg.sh

      - name: Upload DMG as build artifact
        uses: actions/upload-artifact@v5
        with:
          name: Prism-dmg
          path: dist/Prism.dmg
          if-no-files-found: error

      - name: Publish "Prismatix macOS" release
        if: github.ref_name == 'Prismatix'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: macos
          name: Prismatix macOS
          body: |
            **Prismatix — macOS** (native SwiftUI + WebKit + SceneKit)

            ### Install
            1. Open `Prism.dmg` and drag **Prism** into Applications.
            2. The build is ad-hoc signed (not notarized). If macOS says
               *"Prism is damaged"*, clear the quarantine flag in Terminal:
               ```
               xattr -dr com.apple.quarantine /Applications/Prism.app
               ```
          files: dist/Prism.dmg
