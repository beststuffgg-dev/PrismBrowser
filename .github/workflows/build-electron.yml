name: Build Prism (Electron — Windows & macOS)

# Builds the Electron app into a Windows installer (.exe / NSIS) and a macOS
# disk image (.dmg) using electron-builder.
on:
  push:
    branches: [ Prismatix ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: --win
            artifact: Prism-windows
            glob: electron/dist/*.exe
          - os: macos-latest
            target: --mac
            artifact: Prism-macos-electron
            glob: electron/dist/*.dmg
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: electron
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build installer
        env:
          # No code-signing in CI; build unsigned artifacts.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.target }} --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.glob }}
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.glob }}
