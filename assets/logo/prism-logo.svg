<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gold (top-left) → muted → slate-blue (bottom-right), matching the source art -->
    <linearGradient id="pentaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#CBA12B"/>
      <stop offset="0.5"  stop-color="#7E7C84"/>
      <stop offset="1"    stop-color="#46568C"/>
    </linearGradient>

    <!-- Bevel: light top edge, dark bottom edge -->
    <linearGradient id="bevel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1"   stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>

    <!-- Glossy white for the P -->
    <linearGradient id="pGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#EAF0F8"/>
      <stop offset="1"    stop-color="#C7D2E2"/>
    </linearGradient>

    <!-- Soft top sheen overlay on the pentagon -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Pentagon body -->
  <g filter="url(#dropShadow)">
    <path d="M256,46 L455.7,191.1 L379.4,425.9 L132.6,425.9 L56.3,191.1 Z"
          fill="url(#pentaGrad)" stroke-linejoin="round"/>
    <!-- bevel edge -->
    <path d="M256,46 L455.7,191.1 L379.4,425.9 L132.6,425.9 L56.3,191.1 Z"
          fill="none" stroke="url(#bevel)" stroke-width="3" stroke-linejoin="round"/>
    <!-- top sheen -->
    <path d="M256,46 L455.7,191.1 L379.4,425.9 L132.6,425.9 L56.3,191.1 Z"
          fill="url(#sheen)"/>
  </g>

  <!-- The P (glossy white) with a transparent counter (fill-rule evenodd) -->
  <g transform="translate(-12,-8)">
    <path fill-rule="evenodd" fill="url(#pGloss)"
          d="M175,150 H300 A60,60 0 0 1 300,270 H235 V380 H175 Z
             M235,185 H300 A25,25 0 0 1 300,235 H235 Z"/>
  </g>
</svg>
